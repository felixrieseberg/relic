name: release

# Push a v* tag to build every target and attach the archives to a draft
# GitHub release. workflow_dispatch builds the archives as run artifacts
# without creating a release (useful for testing the pipeline).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make test

  build:
    # macppc is deliberately absent: its binaries statically link Apple's
    # Open Transport glue (tools/fetch_otglue.sh) and must not be
    # redistributed. Build that target from source locally.
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: posix, os: ubuntu-latest }
          - { target: posix, os: ubuntu-24.04-arm }
          - { target: posix, os: macos-latest }
          - { target: win32, os: ubuntu-latest }
          - { target: win16, os: ubuntu-latest }
          - { target: xbox, os: ubuntu-latest }
          - { target: wii, os: ubuntu-latest }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: build ${{ matrix.target }}
        run: tools/build_release.sh ${{ matrix.target }}
        env:
          VERSION: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}-${{ matrix.os }}
          path: dist/release/relic-*
          if-no-files-found: error
          overwrite: true

  release:
    # Tag pushes only -- a workflow_dispatch run on a tag ref must NOT
    # create a (duplicate) draft release.
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs: [test, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/release
          merge-multiple: true
      - name: checksums
        run: cd dist/release && sha256sum relic-* > SHA256SUMS
      - name: create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Relic $GITHUB_REF_NAME" \
            --draft \
            --generate-notes \
            dist/release/*
