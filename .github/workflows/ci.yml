name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: format-check
        if: matrix.os == 'ubuntu-latest'
        run: |
          pipx install 'clang-format~=21.1'
          clang-format --version
          make format-check
      - name: test
        run: make test

  valgrind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y valgrind
      - run: make test-valgrind
